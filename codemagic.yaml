# Codemagic CI — builds an UNSIGNED iOS .ipa for Cambio.
# Unsigned is intentional: re-sign it on-device with your own certificate
# via ESign / Sideloadly. Works on Codemagic's free macOS tier and does not
# touch GitHub Actions or GitHub billing.
#
# Usage: on codemagic.io, add this repo, pick the "Cambio iOS (unsigned IPA)"
# workflow, and Start new build. Download the .ipa from Artifacts when done.

workflows:
  ios-unsigned:
    name: Cambio iOS (unsigned IPA)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (no code signing)
        script: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -r -y Cambio-unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/Cambio-unsigned.ipa
